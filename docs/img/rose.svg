<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 150" width="80" height="120">
  <!-- Glass dome -->
  <path d="M20 130 Q20 25 50 12 Q80 25 80 130" stroke="#D4A843" stroke-width="1.5" fill="none" opacity="0.35"/>
  <line x1="18" y1="130" x2="82" y2="130" stroke="#D4A843" stroke-width="2" opacity="0.35"/>

  <!-- Stem -->
  <path d="M50 80 Q48 100 49 125" stroke="#2d6a1e" stroke-width="2.5" fill="none"/>

  <!-- Leaves -->
  <path d="M49 105 Q32 95 36 85 Q44 92 49 105" fill="#3a8a2a"/>
  <path d="M50 112 Q67 102 63 92 Q55 99 50 112" fill="#3a8a2a"/>

  <!-- Fallen petals on base -->
  <ellipse cx="38" cy="128" rx="5" ry="2" fill="#8B2252" opacity="0.3" transform="rotate(-20 38 128)"/>
  <ellipse cx="60" cy="127" rx="4" ry="1.5" fill="#8B2252" opacity="0.25" transform="rotate(15 60 127)"/>

  <!-- Rose bloom -->
  <!-- Outer petals -->
  <path d="M50 40 Q35 42 30 55 Q35 65 50 62 Q45 50 50 40" fill="#7a1d47"/>
  <path d="M50 40 Q65 42 70 55 Q65 65 50 62 Q55 50 50 40" fill="#8B2252"/>
  <path d="M35 50 Q28 58 32 68 Q40 72 48 65 Q38 60 35 50" fill="#6d1940" opacity="0.9"/>
  <path d="M65 50 Q72 58 68 68 Q60 72 52 65 Q62 60 65 50" fill="#9b2a5e" opacity="0.9"/>

  <!-- Middle petals -->
  <path d="M50 42 Q40 46 38 56 Q44 62 50 58 Q46 50 50 42" fill="#a33068"/>
  <path d="M50 42 Q60 46 62 56 Q56 62 50 58 Q54 50 50 42" fill="#b33878"/>

  <!-- Inner bud -->
  <ellipse cx="50" cy="50" rx="6" ry="8" fill="#c44080"/>
  <path d="M50 44 Q47 48 48 54 Q50 56 52 54 Q53 48 50 44" fill="#d4508e"/>

  <!-- Sparkle (magical glow) -->
  <circle cx="50" cy="35" r="1.5" fill="#D4A843" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="42" cy="32" r="1" fill="#D4A843" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="58" cy="33" r="1" fill="#D4A843" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
